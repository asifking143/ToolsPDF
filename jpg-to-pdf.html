<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="favicon-16x16.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convert JPG to PDF Online Free | ToolsPDF</title>
    <meta name="description" content="Instantly convert JPG images into a single PDF document securely in your browser.">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <header class="header scrolled">
        <div class="container header-content">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-file-pdf"></i>
                Tools<span>PDF</span>
            </a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="index.html#tools-section" class="active">All Tools</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="header-actions">
                <button class="mobile-menu-btn" aria-label="Toggle Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-nav">
        <div class="mobile-nav-content">
            <button class="close-menu-btn" aria-label="Close Menu">
                <i class="fa-solid fa-times"></i>
            </button>
            <a href="index.html">Home</a>
            <a href="index.html#tools-section" class="active">All Tools</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    <!-- Tool Header -->
    <section class="tool-page-header">
        <div class="container">
            <h1>JPG to PDF</h1>
            <p>Select your beloved JPG images and convert them swiftly into a PDF document.</p>
        </div>
    </section>

    <!-- Tool Workspace -->
    <section class="section container">
        <div class="tool-workspace" id="drop-zone">
            <!-- Upload Area -->
            <div id="upload-area">
                <i class="fa-regular fa-image upload-icon"></i>
                <h3 style="font-size: 1.5rem; margin-bottom: 15px;">Upload JPG Images</h3>
                <p style="color: var(--color-text-muted); margin-bottom: 25px;">Drag & Drop or click below</p>
                <div class="file-input-wrapper">
                    <button class="btn btn-primary"><i class="fa-solid fa-folder-open"></i> Select JPG Files</button>
                    <input type="file" id="file-input" accept=".jpg,.jpeg" multiple>
                </div>
            </div>

            <!-- Settings Area -->
            <div class="tool-settings" id="tool-settings">
                <div class="file-item" style="margin-bottom: 20px;">
                    <div class="file-info">
                        <i class="fa-regular fa-images"></i>
                        <div>
                            <strong id="file-name-display">0 JPG files selected</strong>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Page Orientation</label>
                    <select id="orientation" class="form-control">
                        <option value="portrait" selected>Portrait</option>
                        <option value="landscape">Landscape</option>
                        <option value="auto">Auto (Match Image)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Page Margin</label>
                    <select id="margin" class="form-control">
                        <option value="0" selected>No Margin (Fit to Page)</option>
                        <option value="20">Small Margin</option>
                        <option value="50">Large Margin</option>
                    </select>
                </div>

                <div class="action-bar" style="display: flex;">
                    <button class="btn btn-secondary" id="cancel-btn" style="margin-right: 15px;">Cancel</button>
                    <button class="btn btn-primary" id="process-btn"><i class="fa-solid fa-file-pdf"></i> Convert to PDF</button>
                </div>
            </div>

            <!-- Loading Info -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <h3 id="progress-text">Generating PDF...</h3>
            </div>
        </div>
        
        <!-- Result actions -->
        <div class="text-center mt-8 hidden" id="result-actions" style="display: none; margin-top: 30px;">
            <h3 class="text-red" style="margin-bottom: 15px;"><i class="fa-solid fa-check-circle"></i> PDF Ready!</h3>
            <p style="margin-bottom: 20px; color: var(--color-text-muted);">Your JPGs have been merged.</p>
            <button class="btn btn-primary" id="download-btn"><i class="fa-solid fa-download"></i> Download PDF</button>
            <button class="btn btn-secondary" style="margin-left: 10px;" id="reset-btn"><i class="fa-solid fa-rotate-right"></i> Convert More</button>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">...</footer>
    <script>
        fetch('index.html')
            .then(res => res.text())
            .then(html => {
                const doc = new DOMParser().parseFromString(html, 'text/html');
                document.querySelector('.footer').innerHTML = doc.querySelector('.footer').innerHTML;
            });
    </script>
    <script src="script.js"></script>
    <script src="js/jpg-to-pdf.js"></script>
</body>
</html>
